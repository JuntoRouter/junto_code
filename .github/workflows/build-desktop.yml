name: Build Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install || bun install

      - name: Build CLI
        run: bun run --filter opencode build

      - uses: actions/upload-artifact@v4
        with:
          name: opencode-cli
          path: |
            packages/opencode/dist/opencode-darwin-arm64
            packages/opencode/dist/opencode-darwin-x64-baseline
          retention-days: 7

      - uses: actions/upload-artifact@v4
        with:
          name: opencode-cli-windows
          path: packages/opencode/dist/opencode-windows-x64-baseline
          retention-days: 7

  build-desktop:
    needs: build-cli
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            cli-artifact: opencode-cli
            sidecar-binary: opencode-darwin-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            cli-artifact: opencode-cli
            sidecar-binary: opencode-darwin-x64-baseline
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            cli-artifact: opencode-cli-windows
            sidecar-binary: opencode-windows-x64-baseline

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri
          shared-key: ${{ matrix.target }}

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting version to $VERSION"
          cd packages/desktop
          node -e "const p=require('./package.json'); p.version='$VERSION'; require('fs').writeFileSync('./package.json', JSON.stringify(p, null, 2)+'\n')"
        shell: bash

      - name: Install dependencies
        run: bun install || bun install

      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.cli-artifact }}
          path: packages/opencode/dist

      - name: Find and copy sidecar binary (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          mkdir -p packages/desktop/src-tauri/sidecars
          BINARY=$(find packages/opencode/dist -name "opencode" -type f | head -1)
          echo "Found binary: $BINARY"
          cp "$BINARY" packages/desktop/src-tauri/sidecars/juntocode-cli-${{ matrix.target }}
          chmod +x packages/desktop/src-tauri/sidecars/juntocode-cli-${{ matrix.target }}

      - name: Find and copy sidecar binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path packages/desktop/src-tauri/sidecars
          $binary = Get-ChildItem -Path packages/opencode/dist -Recurse -Filter "opencode.exe" | Select-Object -First 1
          Write-Host "Found binary: $($binary.FullName)"
          Copy-Item $binary.FullName "packages/desktop/src-tauri/sidecars/juntocode-cli-${{ matrix.target }}.exe"

      - name: Build Tauri desktop app
        working-directory: packages/desktop
        run: bun run tauri build --target ${{ matrix.target }} ${{ startsWith(github.ref, 'refs/tags/v') && '--config ./src-tauri/tauri.prod.conf.json' || '' }}
        timeout-minutes: 60
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ startsWith(github.ref, 'refs/tags/v') && secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Upload macOS artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: juntocode-desktop-${{ matrix.target }}
          path: |
            packages/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
            packages/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          retention-days: 30

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: juntocode-desktop-${{ matrix.target }}
          path: |
            packages/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            packages/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
          retention-days: 30

  release:
    needs: build-desktop
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/juntocode-desktop-*/**/*.dmg
            artifacts/juntocode-desktop-*/**/*.exe
            artifacts/juntocode-desktop-*/**/*.msi
